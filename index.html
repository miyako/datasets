      --link: #185FA5;
    --link-hover: #0C447C;

        --text: #f0ede8; --text2: #b4b2a9; --text3: #888780;
        --user-bg: #0C447C; --user-text: #E6F1FB; --user-border: #185FA5; --user-label: #85B7EB;
        --asst-bg: #26215C; --asst-text: #EEEDFE; --asst-border: #534AB7; --asst-label: #AFA9EC;
        --sys-bg: #2c2c2a; --sys-text: #888780; --sys-border: rgba(255,255,255,0.1);
        --tool-bg: #04342C; --tool-text: #E1F5EE; --tool-border: #1D9E75; --tool-label: #5DCAA5;
        --danger-bg: #3d1a1a; --danger-text: #f09595;
        
        --link: #85B7EB;
        --link-hover: #B5D4F4;
      }
    }

    /* Basic Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      scroll-behavior: smooth;
    }

    a {
        color: var(--link);
        text-decoration: none;
        transition: color 0.2s ease-in-out;
    }
      
    a:hover, a:focus {
        color: var(--link-hover);
        text-decoration: underline;
    }
    /* --- ADDED LAYOUT CSS --- */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .page-header {
      margin-bottom: 3rem;

    }

    .page-title {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .page-subtitle {

      color: var(--text2);
    }

    main {
        display: flex;
        flex-direction: column;
        gap: 2rem; /* This adds perfect spacing between your sections automatically */

    .content-section {

      color: var(--text);
    }

    .content-text {
      color: var(--text);
    }
